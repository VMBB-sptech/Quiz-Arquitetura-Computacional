<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Arq-Comp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: black;">

    <div class="centralizar">
        <h1 style="color: white;">
            Quiz bacana
        </h1>
    </div>

    
    <div class="caixa-perguntas centralizar">
        <h3 id="QuestaoDisplay">texto</h3>

        <div style="padding: 20px;">Pergunta</div>

        <div class="caixa-itermédio" style="gap: 10px;">
            <div class="caixa-menor" style="color: white;" id="reposta1" onclick="clicarBotão('AlternativaA')">
                texto
            </div>
            <div class="caixa-menor" style="color: white;" id="reposta2" onclick="clicarBotão('AlternativaB')">
                texto2
            </div>
            <div class="caixa-menor" style="color: white;" id="reposta3" onclick="clicarBotão('AlternativaC')">
                texto3
            </div>
            <div class="caixa-menor" style="color: white;" id="reposta4" onclick="clicarBotão('AlternativaD')">
                texto4
            </div>
        </div>
        
    </div>
    
</body>
</html>

<script>
    function clicarBotão (resposta){
        alert(`botão apertado foi: ${resposta}`)
    }
</script>
